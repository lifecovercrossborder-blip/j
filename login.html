<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Authentication - Cross Border Life Cover</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 6rem auto;
            padding: 3rem 2.5rem;
            background-color: var(--bg-card);
            border: var(--border-thin);
            border-radius: 4px;
        }
        .auth-tabs {
            display: flex;
            border-bottom: var(--border-thin);
            margin-bottom: 2rem;
        }
        .auth-tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-body);
            padding: 0.75rem;
            cursor: pointer;
            font-family: var(--font-serif);
            font-size: 1.1rem;
            transition: color 0.2s;
        }
        .auth-tab-btn.active {
            color: var(--accent-gold);
            border-bottom: 2px solid var(--accent-gold);
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }
        .form-group label {
            font-size: 0.8rem;
            color: var(--text-white);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control {
            background-color: #0b1118;
            border: var(--border-thin);
            padding: 0.75rem 1rem;
            color: var(--text-white);
            border-radius: 4px;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: var(--accent-gold);
            outline: none;
        }
        .alert {
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <nav class="nav-container">
            <a href="index.html" class="logo-container">
                <img src="images/logo.png" alt="Cross Border Life Cover Logo" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="plans.html">Plans</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="faq.html">FAQs</a></li>
                <li><a href="contact.html">Contacts</a></li>
                <li><a href="login.html" class="btn btn-primary active">Member Log In</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-container">
        
        <!-- Action Alerts -->
        <div id="auth-alert" class="alert"></div>

        <div class="auth-tabs">
            <button class="auth-tab-btn active" id="tab-login" onclick="switchForm('login')">Sign In</button>
            <button class="auth-tab-btn" id="tab-register" onclick="switchForm('register')">Register</button>
        </div>

        <!-- 1. Sign In Form -->
        <form id="login-form" onsubmit="handleSignIn(event)">
            <div class="form-group">
                <label for="li-email">Email Address</label>
                <input type="email" id="li-email" class="form-control" required placeholder="Enter your email...">
            </div>
            <div class="form-group">
                <label for="li-password">Password</label>
                <input type="password" id="li-password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem;">
                <a href="#" onclick="showForgotPassword(event)" style="color: var(--accent-gold); text-decoration: none;">Forgot password?</a>
            </p>
        </form>

        <!-- 2. Sign Up Form -->
        <form id="register-form" onsubmit="handleSignUp(event)" style="display: none;">
            <div class="form-group">
                <label for="rg-name">Full Name</label>
                <input type="text" id="rg-name" class="form-control" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="rg-email">Email Address</label>
                <input type="email" id="rg-email" class="form-control" required placeholder="payer@domain.com">
            </div>
            <div class="form-group">
                <label for="rg-phone">Phone Number</label>
                <input type="tel" id="rg-phone" class="form-control" required placeholder="+27 83 123 4567">
            </div>
            <div class="form-group">
                <label for="rg-country">Country of Origin</label>
                <select id="rg-country" class="form-control" style="background-color: #0b1118; height: 46px;">
                    <option value="Zimbabwe">Zimbabwe</option>
                    <option value="Lesotho">Lesotho</option>
                    <option value="Mozambique">Mozambique</option>
                    <option value="Malawi">Malawi</option>
                    <option value="Zambia">Zambia</option>
					<option value="Zambia">Nigeria</option>
					<option value="Zambia">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="rg-password">Password</label>
                <input type="password" id="rg-password" class="form-control" required placeholder="Min 6 characters">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>

        <!-- 3. Password Reset Form -->
        <form id="forgot-form" onsubmit="handleForgotPasswordSubmit(event)" style="display: none;">
            <h3 style="font-family: var(--font-serif); color: var(--accent-gold); margin-bottom: 1rem; font-size: 1.2rem;">Recover Password</h3>
            <p style="color: var(--text-body); font-size: 0.85rem; margin-bottom: 1.5rem; line-height: 1.5;">Enter your registration email. We will send you a secure link to reset your account password.</p>
            <div class="form-group">
                <label for="fg-email">Email Address</label>
                <input type="email" id="fg-email" class="form-control" required placeholder="payer@domain.com">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Send Reset Link</button>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem;">
                <a href="#" onclick="switchForm('login')" style="color: var(--accent-gold); text-decoration: none;">&larr; Back to login</a>
            </p>
        </form>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script>
        const alertBox = document.getElementById('auth-alert');

        function showAlert(message, type) {
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            if (type === 'success') {
                alertBox.style.backgroundColor = 'rgba(40, 167, 69, 0.1)';
                alertBox.style.border = '1px solid #28a745';
                alertBox.style.color = '#28a745';
            } else {
                alertBox.style.backgroundColor = 'rgba(220, 53, 69, 0.1)';
                alertBox.style.border = '1px solid #dc3545';
                alertBox.style.color = '#dc3545';
            }
        }

        // Catch unauthorized redirect signals from route guards
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('status') === 'unauthorized') {
                showAlert("Access restricted. Please sign in to open your secure member dashboard.", "error");
            }
        });

        // Tab switcher
        function switchForm(mode) {
            alertBox.style.display = 'none';
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const forgotForm = document.getElementById('forgot-form');
            const btnLogin = document.getElementById('tab-login');
            const btnRegister = document.getElementById('tab-register');

            if (mode === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
                forgotForm.style.display = 'none';
                btnLogin.classList.add('active');
                btnRegister.classList.remove('active');
            } else if (mode === 'register') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                forgotForm.style.display = 'none';
                btnLogin.classList.remove('active');
                btnRegister.classList.add('active');
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'none';
                forgotForm.style.display = 'block';
                btnLogin.classList.remove('active');
                btnRegister.classList.remove('active');
            }
        }

        function showForgotPassword(e) {
            e.preventDefault();
            switchForm('forgot');
        }

        // Form Submit Sign In Action
        async function handleSignIn(e) {
            e.preventDefault();
            const email = document.getElementById('li-email').value;
            const password = document.getElementById('li-password').value;

            const response = await signInUser(email, password);
            if (response.error) {
                showAlert(response.error.message, "error");
            } else {
                window.location.href = "dashboard.html";
            }
        }

        // Form Submit Sign Up Action
        async function handleSignUp(e) {
            e.preventDefault();
            const name = document.getElementById('rg-name').value;
            const email = document.getElementById('rg-email').value;
            const phone = document.getElementById('rg-phone').value;
            const country = document.getElementById('rg-country').value;
            const password = document.getElementById('rg-password').value;

            const response = await signUpUser(email, password, name, phone, country);
            if (response.error) {
                showAlert(response.error.message, "error");
            } else {
                // By default, Supabase requires email verification. Let users know.
                showAlert("Registration successful! Check your email inbox to verify your account before logging in [1].", "success");
                switchForm('login');
            }
        }

        // Form Submit Password Reset Action
        async function handleForgotPasswordSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('fg-email').value;
            const response = await requestPasswordReset(email);
            if (response && response.error) {
                showAlert(response.error.message, "error");
            } else {
                showAlert("A secure password recovery link has been dispatched to your email inbox [1].", "success");
            }
        }
    </script>
</body>
</html>
