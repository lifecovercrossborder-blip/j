<!-- dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard - Cross Border Life Cover</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-layout {
            max-width: 1100px;
            margin: 4rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
        }
        @media (max-width: 768px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
            }
        }
        .dash-card {
            background-color: var(--bg-card);
            border: var(--border-thin);
            padding: 2.5rem;
            border-radius: 4px;
        }
        .dash-card h3 {
            font-family: var(--font-serif);
            color: var(--accent-gold);
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
        }
        .meta-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .meta-list li {
            font-size: 1rem;
            color: var(--text-white);
            margin-bottom: 1.25rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
            padding-bottom: 0.5rem;
        }
        .meta-list li span {
            color: var(--text-body);
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <nav class="nav-container">
            <a href="index.html" class="logo-container">
                <img src="images/logo.png" alt="Cross Border Life Cover Logo" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="plans.html">Plans</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="faq.html">FAQs</a></li>
                <li><a href="contact.html">Contacts</a></li>
                <li><button onclick="signOutUser()" class="btn btn-primary" style="background-color: #dc3545; border-color: #dc3545; color: white; cursor: pointer;">Log Out</button></li>
            </ul>
        </nav>
    </header>

    <div class="dashboard-layout">
        
        <!-- Left: Client Profile Info -->
        <div class="dash-card">
            <h3>Member Credentials Profile</h3>
            <ul class="meta-list">
                <li><span>Client Name:</span> <strong id="dash-name">Loading...</strong></li>
                <li><span>Payer Email:</span> <strong id="dash-email">Loading...</strong></li>
                <li><span>Phone Number:</span> <strong id="dash-phone">Loading...</strong></li>
                <li><span>SADC Destination:</span> <strong id="dash-country">Loading...</strong></li>
            </ul>
            <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                <a href="plans.html" class="btn btn-primary" style="font-size: 0.85rem; padding: 0.5rem 1rem;">Change Policy Plan</a>
                <a href="paymentplan.html" class="btn btn-primary" style="font-size: 0.85rem; padding: 0.5rem 1rem; background-color: var(--accent-gold); color: #0b1118; border: none;">Pay Online</a>
            </div>
        </div>

        <!-- Right: Login Session Logs Audit Trail -->
        <div class="dash-card">
            <h3>Recent Secure Sessions</h3>
            <ul id="dash-history-list" style="list-style: none; padding: 0; margin: 0;">
                <li style="color: var(--text-body); font-size: 0.9rem;">No sessions logged in this account.</li>
            </ul>
        </div>

    </div>

    <!-- Script triggers -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
</body>
</html>
