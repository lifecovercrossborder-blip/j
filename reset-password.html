<!-- reset-password.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Cross Border Life Cover</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .reset-container {
            max-width: 500px;
            margin: 8rem auto;
            padding: 3rem 2.5rem;
            background-color: var(--bg-card);
            border: var(--border-thin);
            border-radius: 4px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .form-control {
            background-color: #0b1118;
            border: var(--border-thin);
            padding: 0.75rem 1rem;
            color: var(--text-white);
            border-radius: 4px;
        }
        .form-control:focus {
            border-color: var(--accent-gold);
            outline: none;
        }
    </style>
</head>
<body>

    <main class="reset-container">
        <h2 style="font-family: var(--font-serif); color: var(--accent-gold); margin-bottom: 1rem;">Set New Password</h2>
        <p style="color: var(--text-body); font-size: 0.95rem; margin-bottom: 2rem;">Please input your new account password below.</p>
        
        <div id="reset-alert" style="display: none; padding: 0.75rem; border-radius: 4px; margin-bottom: 1.5rem; text-align: center; font-size: 0.9rem;"></div>

        <form onsubmit="handlePasswordUpdate(event)">
            <div class="form-group">
                <label for="new-pass" style="font-size: 0.85rem; color: var(--text-white); text-transform: uppercase;">New Password</label>
                <input type="password" id="new-pass" class="form-control" required placeholder="Minimum 6 characters...">
            </div>
            <button type="submit" class="btn btn-primary" style="background-color: var(--accent-gold); color: #0b1118; border: none; width: 100%;">Commit New Password</button>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script>
        async function handlePasswordUpdate(e) {
            e.preventDefault();
            const pass = document.getElementById('new-pass').value;
            const alertBox = document.getElementById('reset-alert');

            const { data, error } = await updatePassword(pass);
            if (error) {
                alertBox.textContent = error.message;
                alertBox.style.display = 'block';
                alertBox.style.backgroundColor = 'rgba(220, 53, 69, 0.15)';
                alertBox.style.color = '#dc3545';
                alertBox.style.border = '1px solid #dc3545';
            } else {
                alertBox.textContent = "Success! Password updated. Redirecting to login...";
                alertBox.style.display = 'block';
                alertBox.style.backgroundColor = 'rgba(40, 167, 69, 0.15)';
                alertBox.style.color = '#28a745';
                alertBox.style.border = '1px solid #28a745';
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2000);
            }
        }
    </script>
</body>
</html>
