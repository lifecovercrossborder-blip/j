<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Cross Border Life Cover</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
    <nav class="nav-container">
        <a href="index.html" class="logo-container">
            <img src="images/logo.png" alt="Cross Border Life Cover Logo" class="logo-img">
        </a>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="plans.html">Plans</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="faq.html">FAQs</a></li>
            <li><a href="contact.html">Contacts</a></li>
			<a href="login.html" class="btn btn-primary">Member Log In</a>
        </ul>
    </nav>
</header>

    <section class="section-container" style="max-width: 600px; margin: 4rem auto;">
        <div class="form-box">
            <h2 class="form-title">Reset Password</h2>
            
            <form id="request-reset-form">
                <p style="margin-bottom: 1.5rem; font-size: 0.95rem; text-align: center;">Enter your email to receive a password recovery link.</p>
                <div class="form-row">
                    <label class="form-label" for="reset-email">Email Address</label>
                    <input type="email" id="reset-email" class="form-input" required placeholder="Enter your email...">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem;">Send Reset Link</button>
            </form>

            <form id="new-password-form" style="display:none;">
                <p style="margin-bottom: 1.5rem; font-size: 0.95rem; text-align: center;">Please choose a strong new password.</p>
                <div class="form-row">
                    <label class="form-label" for="new-password">New Password</label>
                    <input type="password" id="new-password" class="form-input" required placeholder="Enter new password...">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 2rem;">Update Password</button>
            </form>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script>
        const hash = window.location.hash;
        const isRecoverySession = hash && hash.includes("type=recovery");

        if (isRecoverySession) {
            document.getElementById("request-reset-form").style.display = "none";
            document.getElementById("new-password-form").style.display = "block";
        }

        document.getElementById("request-reset-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("reset-email").value;
            try {
                await sendPasswordReset(email);
                alert("Password reset email sent! Please check your inbox.");
            } catch (error) {
                alert(error.message);
            }
        });

        document.getElementById("new-password-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById("new-password").value;
            try {
                await updatePassword(newPassword);
                alert("Password changed successfully. You may now log in.");
                window.location.href = "login.html";
            } catch (error) {
                alert(error.message);
            }
        });
    </script>
</body>
</html>
